name: Prepare Major Release (dev)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Bump major version on dev
        run: |
          python radioshaq/scripts/bump_version.py --project-root . --bump major --sync-all
      - name: Commit and push version update to dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radioshaq/pyproject.toml radioshaq/radioshaq/__init__.py radioshaq/web-interface/package.json
          git commit -m "chore(release): prepare major version on dev"
          git push origin HEAD:dev

