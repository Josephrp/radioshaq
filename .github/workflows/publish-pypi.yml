# Build and publish radioshaq to PyPI (single package: API, web UI, remote receiver).
# Trigger: manual (workflow_dispatch) or on release (publish).
# Prerequisite: Configure Trusted Publishing on PyPI:
#   https://pypi.org/manage/project/radioshaq/settings/publishing/

name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Test radioshaq (includes remote_receiver unit tests)
        run: |
          cd radioshaq && uv sync --extra dev --extra test --extra sdr && uv run pytest tests/unit tests/integration -v

  build-and-publish-radioshaq:
    name: Build and publish radioshaq
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: radioshaq/web-interface/package-lock.json
      - name: Verify web UI paths
        run: |
          ls -la
          ls -la radioshaq
          ls -la radioshaq/web-interface
          test -f radioshaq/web-interface/package-lock.json
      - name: Build web UI
        working-directory: radioshaq/web-interface
        run: |
          node --version
          npm --version
          npm ci --no-audit --no-fund
          npm run build
      - name: Stage web UI for wheel
        run: |
          mkdir -p radioshaq/radioshaq/web_ui
          cp -r radioshaq/web-interface/dist/. radioshaq/radioshaq/web_ui/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Build radioshaq wheel and sdist
        run: |
          cd radioshaq && uv run --with build python -m build
      - name: Publish radioshaq to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: radioshaq/dist
