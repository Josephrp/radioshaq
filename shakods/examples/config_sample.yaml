# SHAKODS configuration sample (optional; env vars override)
# Copy to config.yaml or set SHAKODS_CONFIG_PATH

mode: field  # field | hq | receiver

database:
  postgres_url: postgresql+asyncpg://shakods:shakods@127.0.0.1:5434/shakods
  dynamodb_table_prefix: shakods
  dynamodb_region: us-east-1

auth:
  jwt_secret: change-me-in-production
  access_token_expire_minutes: 30

radio:
  default_band: 40m
  cat_enabled: false
  audio_input_enabled: false
  audio_output_enabled: false
  audio_monitoring_enabled: false

# Voice RX pipeline (audio capture, ASR, response modes)
audio:
  input_device: null
  input_sample_rate: 16000
  output_device: null
  vad_enabled: true
  vad_mode: aggressive
  asr_model: voxtral
  asr_language: en
  response_mode: listen_only
  response_delay_ms: 500
  trigger_enabled: true
  trigger_phrases: ["shakods", "field station"]
  trigger_match_mode: contains

llm:
  provider: mistral
  model: mistral-small-latest

logging:
  level: INFO
