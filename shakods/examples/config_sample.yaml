# SHAKODS configuration sample (optional; env vars override)
# Copy to config.yaml or set SHAKODS_CONFIG_PATH

mode: field  # field | hq | receiver

database:
  postgres_url: postgresql+asyncpg://shakods:shakods@127.0.0.1:5434/shakods
  dynamodb_table_prefix: shakods
  dynamodb_region: us-east-1

auth:
  jwt_secret: change-me-in-production
  access_token_expire_minutes: 30

radio:
  default_band: 40m
  cat_enabled: false

llm:
  provider: mistral
  model: mistral-small-latest

logging:
  level: INFO
