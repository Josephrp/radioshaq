# SHAKODS Alembic Configuration
# For database migration management with PostgreSQL/PostGIS

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

#sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# Version path separator
version_path_separator = os

# The default encoding to use for migration files
output_encoding = utf-8

# Databases
# The URL is set via environment variable DATABASE_URL in env.py
# Format: postgresql://user:password@localhost:5432/shakods

[post_write_hooks]
# Hook for ruff formatting after migration generation
hooks = ruff_format, ruff_check

ruff_format.type = exec
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

ruff_check.type = exec
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
