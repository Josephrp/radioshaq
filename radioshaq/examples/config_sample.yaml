# RadioShaq configuration sample (optional; env vars override)
# Copy to config.yaml or set RADIOSHAQ_CONFIG_PATH

mode: field  # field | hq | receiver

database:
  postgres_url: postgresql+asyncpg://radioshaq:radioshaq@127.0.0.1:5434/radioshaq
  dynamodb_table_prefix: radioshaq
  dynamodb_region: us-east-1

auth:
  jwt_secret: change-me-in-production
  access_token_expire_minutes: 30

radio:
  default_band: 40m
  # listen_bands: [40m, 2m]   # Bands to monitor; omit to use default_band only
  listener_enabled: false
  listener_cycle_seconds: 30
  listener_concurrent_bands: true   # false = single receiver, round-robin
  receiver_upload_store: false
  receiver_upload_inject: false
  # SDR TX (HackRF) coordination
  # When enabled, RadioShaq can transmit via HackRF either directly from HQ (local)
  # or via a remote receiver service (broker).
  sdr_tx_enabled: false
  sdr_tx_backend: hackrf
  # sdr_tx_mode: local   # HQ owns HackRF directly (pyhackrf2); do not also run run-receiver with HackRF.
  # sdr_tx_mode: remote  # Remote receiver owns HackRF; HQ calls /tx endpoints on the receiver service.
  # sdr_tx_service_base_url: "http://localhost:8765"  # Required when sdr_tx_mode=remote
  cat_enabled: false
  audio_input_enabled: false
  audio_output_enabled: false
  audio_monitoring_enabled: false

# Voice RX pipeline (audio capture, ASR, response modes)
audio:
  input_device: null
  input_sample_rate: 16000
  output_device: null
  vad_enabled: true
  vad_mode: aggressive
  asr_model: voxtral
  asr_language: en
  response_mode: listen_only
  response_delay_ms: 500
  trigger_enabled: true
  trigger_phrases: ["radioshaq", "field station"]
  trigger_match_mode: contains

llm:
  provider: mistral
  model: mistral-small-latest

logging:
  level: INFO
