# SHAKODS API Gateway REST API - routes to Lambda
AWSTemplateFormatVersion: "2010-09-09"
Description: SHAKODS API Gateway

Parameters:
  Environment:
    Type: String
    Default: staging
  ApiHandlerFunctionArn:
    Type: String
    Description: ARN of API Lambda (from lambda stack)

Resources:
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "radioshaq-${Environment}-api"
      Description: SHAKODS REST API
      EndpointConfiguration:
        Types: [REGIONAL]

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "radioshaq-${Environment}-apigw-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole

  ApiGatewayInvokePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "radioshaq-${Environment}-apigw-invoke"
      Roles: [!Ref ApiGatewayRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource: !Sub "${ApiHandlerFunctionArn}"

  RootMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: ApiGatewayPermission
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandlerFunctionArn}/invocations"

  ApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "${ApiHandlerFunctionArn}"
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*"

  Deployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: RootMethod
    Properties:
      RestApiId: !Ref RestApi
      StageName: !Ref Environment

Outputs:
  ApiEndpoint:
    Description: API base URL
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"
  RestApiId:
    Description: REST API ID
    Value: !Ref RestApi
    Export:
      Name: !Sub "${AWS::StackName}-RestApiId"
