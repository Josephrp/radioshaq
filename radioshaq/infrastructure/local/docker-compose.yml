# Docker Compose for RadioShaq local development
#
# Postgres is mapped to host port 5434 to avoid conflict with a local PostgreSQL
# already using 5432. Set DATABASE_URL=postgresql+asyncpg://radioshaq:radioshaq@127.0.0.1:5434/radioshaq
# (or use default in config).
#
# Usage:
#   docker compose up -d postgres   # Start Postgres on 5434
#   docker compose --profile hindsight up -d postgres hindsight   # Postgres + Hindsight (memory)
#   radioshaq launch docker         # Same as first (from project root)
#   radioshaq launch docker --hindsight   # Same as second
#   docker compose down
#   docker compose logs postgres

services:
  # ==========================================
  # PostgreSQL with PostGIS (host port 5434 to avoid conflict with local 5432)
  # ==========================================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: radioshaq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: radioshaq
      POSTGRES_PASSWORD: radioshaq
      POSTGRES_DB: radioshaq
      LANG: en_US.utf8
      LC_ALL: en_US.utf8
    ports:
      - "5434:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
      # Initial setup scripts
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radioshaq -d radioshaq"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radioshaq-network

  # ==========================================
  # PostgreSQL for testing
  # ==========================================
  postgres-test:
    image: postgis/postgis:16-3.4
    container_name: radioshaq-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: radioshaq
      POSTGRES_PASSWORD: radioshaq
      POSTGRES_DB: radioshaq_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radioshaq -d radioshaq_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - radioshaq-network

  # ==========================================
  # Redis (for caching/sessions)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: radioshaq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - radioshaq-network

  # ==========================================
  # LocalStack (AWS emulator)
  # ==========================================
  localstack:
    image: localstack/localstack:latest
    container_name: radioshaq-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"  # LocalStack edge port
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SERVICES=dynamodb,s3,sqs,sns,lambda
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - radioshaq-network

  # ==========================================
  # PGAdmin (optional, for database management)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: radioshaq-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@radioshaq.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - radioshaq-network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

  # ==========================================
  # Hindsight (semantic memory; optional)
  # Start with: docker-compose --profile hindsight up -d hindsight
  # RadioShaq: set RADIOSHAQ_MEMORY__HINDSIGHT_BASE_URL=http://localhost:8888
  # Hindsight uses the same Postgres as RadioShaq (same instance, schema "hindsight") and the same LLM config.
  # ==========================================
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: radioshaq-hindsight
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8888:8888"   # API
      - "9999:9999"   # Control Plane UI
    environment:
      # Use RadioShaq's configured LLM (same .env as the app)
      - HINDSIGHT_API_LLM_PROVIDER=${RADIOSHAQ_LLM__PROVIDER:-${HINDSIGHT_API_LLM_PROVIDER:-openai}}
      - HINDSIGHT_API_LLM_MODEL=${RADIOSHAQ_LLM__MODEL:-${HINDSIGHT_API_LLM_MODEL:-gpt-4o-mini}}
      # API key: first non-empty of RadioShaq keys, then generic keys
      - HINDSIGHT_API_LLM_API_KEY=${RADIOSHAQ_LLM__OPENAI_API_KEY:-${OPENAI_API_KEY:-${RADIOSHAQ_LLM__MISTRAL_API_KEY:-${MISTRAL_API_KEY:-${RADIOSHAQ_LLM__ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-${RADIOSHAQ_LLM__GEMINI_API_KEY:-${GEMINI_API_KEY:-${RADIOSHAQ_LLM__CUSTOM_API_KEY:-${HINDSIGHT_API_LLM_API_KEY:-}}}}}}}}}}
      # Custom base URL (e.g. OpenAI-compatible or Mistral endpoint)
      - HINDSIGHT_API_LLM_BASE_URL=${RADIOSHAQ_LLM__CUSTOM_API_BASE:-${HINDSIGHT_API_LLM_BASE_URL:-}}
      # Same Postgres as RadioShaq (postgres service, db radioshaq; pgvector in postgres/init/02-pgvector.sql)
      - HINDSIGHT_API_DATABASE_URL=${HINDSIGHT_API_DATABASE_URL:-postgresql://radioshaq:radioshaq@postgres:5432/radioshaq}
      - HINDSIGHT_API_DATABASE_SCHEMA=${HINDSIGHT_API_DATABASE_SCHEMA:-hindsight}
      - HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP=${HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP:-true}
    networks:
      - radioshaq-network
    profiles:
      - hindsight

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  postgres_test_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local
  pgadmin_data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  radioshaq-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
